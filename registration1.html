<style>

<body>
<header class="header">
<div class="logo">SVARA</div>
<nav class="nav">
<a href="login1.html">Login</a>
<a href="registration1.html">Register</a>
<a href="home1.html">Home</a>
<a href="guitars1.html">Guitars</a>
<a href="pianos1.html">Pianos</a>
<a href="drums1.html">Drums</a>
<a href="tutorials1.html">Tutorials</a>
<a href="contact1.html">Contact</a>
<a href="about us1.html">About Us</a>
</nav>
<button class="mobile-menu">Menu</button>
</header>
<main>
<div class="registration-container">
<h2>Create Your SVARA Account</h2>
<form id="regForm" action="register_sql.php" method="post">
<div class="form-group">
<label>Full Name</label>
<input type="text" name="name" required>
</div>
<div class="form-group">
<label>Email Address</label>
<input type="email" name="email" required>
</div>
<div class="form-group">
<label>Password</label>
<input type="password" name="password" required minlength="8">
</div>
<div class="form-group">
<label>Confirm Password</label>
<input type="password" name="confirm-password" required>
</div>
<button type="submit" name="register_submit" class="register-button">
Register Now
</button>
</form>
<div class="login-link">
Already have an account? <a href="login1.html">Login here</a>
</div>
<div class="login-link">
Want to delete the registered account?
<a href="de-register.html">De-register your account</a>
</div>
<div class="login-link">
Want to update your information?
<a href="update.html">Update information</a>
</div>
</div>
</main>
<footer class="footer">
<p>&copy; 2025 SVARA Musical Instruments</p>
</footer>

<div id="svara-overlay">
  <div id="svara-popup">
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
    <button id="popupBtn">OK</button>
  </div>
</div>

<script>
document.getElementById('regForm').addEventListener('submit', async function(e){
  e.preventDefault();

  const formData = new FormData(this);
  formData.append('register_submit', 'true');

  try {
    const res  = await fetch('register_sql.php', { method:'POST', body: formData });
    const text = await res.text();    let title, msg, redirect = null;

    if(text.includes('Successful')){
      title = 'Registration Successful!';
      msg   = 'Your SVARA account has been created. Click OK to go to the login page.';
      redirect = 'login1.html';
    } else if(text.includes('already registered')){
      title = 'Email Already Registered';
      msg   = 'This email is already in use. Please log in or use a different email.';
    } else if(text.includes('do not match')){
      title = 'Passwords Do Not Match';
      msg   = 'Please make sure both passwords are the same and try again.';
    } else if(text.includes('Connection failed')){
      title = 'Connection Error';
      msg   = 'Could not connect to the database. Please try again later.';
    } else {
      title = 'Something went wrong';
      msg   = text.replace(/<[^>]+>/g,'').trim() || 'Please try again.';
    }
    document.getElementById('popupTitle').textContent = title;
    document.getElementById('popupMsg').textContent   = msg;
    document.getElementById('svara-overlay').classList.add('active');

    document.getElementById('popupBtn').onclick = function(){
      document.getElementById('svara-overlay').classList.remove('active');
      if(redirect) window.location.href = redirect;
    };

  } catch(err){
    alert('Network error - please check your connection.');
  }
});
</script>
</body>
</html>
